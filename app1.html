function ProgressBar({ step, total }) {

function ChipSelect({ label, hint, options, selected, onToggle, single = false }) {
return (
<div style={{ marginBottom: 22 }}>

function OutputCard({ title, content, icon, badge }) {
const [copied, setCopied] = useState(false);
return (
<div style={{ background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 10, padding: "16px 18px", marginBottom: 14 }}>

<p style={{ color: "#d1d5db", fontSize: 14, lineHeight: 1.75, margin: 0, whiteSpace: "pre-wrap" }}>{content}</p>

}

const askClaude = async (apiKey, systemPrompt, userPrompt, maxTokens = 900) => {
const res = await fetch("https://api.anthropic.com/v1/messages", {
method: "POST",
headers: {
"Content-Type": "application/json",
"x-api-key": apiKey,
"anthropic-version": "2023-06-01",
"anthropic-dangerous-direct-browser-access": "true"
},
body: JSON.stringify({
model: "claude-sonnet-4-6",
max_tokens: maxTokens,
system: systemPrompt,
messages: [{ role: "user", content: userPrompt }]
}),
});
if (!res.ok) {
const e = await res.json().catch(() => ({}));
throw new Error(e?.error?.message || `API error ${res.status}`);
}
const data = await res.json();
if (data.error) throw new Error(data.error.message);
const raw = data.content.map(i => i.type === "text" ? i.text : "").join("").trim();
const attempts = [
() => JSON.parse(raw),
() => { const m = raw.match(/```(?:json)?\s*([\s\S]*?)```/); if (m) return JSON.parse(m[1].trim()); throw new Error(); },
() => { const m = raw.match(/\{[\s\S]*\}/); if (m) return JSON.parse(m[0]); throw new Error(); },
];
for (const attempt of attempts) {
try { return attempt(); } catch {}
}
throw new Error("AI returned an unexpected format. Please try again.");
};

const SYSTEM = `You are the world's best real estate copywriter. You ALWAYS respond with ONLY a valid JSON object. No markdown. No backticks. No explanation. Just the raw JSON object starting with { and ending with }.`;

function App() {
const [screen, setScreen] = useState("key");
const [apiKey, setApiKey] = useState("");
const [currentStep, setCurrentStep] = useState(1);
const [loading, setLoading] = useState(false);
const [loadingMsg, setLoadingMsg] = useState("");
const [loadingPct, setLoadingPct] = useState(0);
const [result, setResult] = useState(null);
const [error, setError] = useState("");
const [activeTab, setActiveTab] = useState("listing");
const [language, setLanguage] = useState("English");

// Mode
const [mode, setMode] = useState("");

// Property basics
const [propType, setPropType] = useState("");
const [address, setAddress] = useState("");
const [price, setPrice] = useState("");
const [oldPrice, setOldPrice] = useState("");
const [beds, setBeds] = useState("");
const [baths, setBaths] = useState("");
const [sqft, setSqft] = useState("");
const [lotSize, setLotSize] = useState("");
const [yearBuilt, setYearBuilt] = useState("");
const [condition, setCondition] = useState("");
const [soldPrice, setSoldPrice] = useState("");
const [daysOnMarket, setDaysOnMarket] = useState("");

// Open house specific
const [openHouseDate, setOpenHouseDate] = useState("");
const [openHouseTime, setOpenHouseTime] = useState("");

// Location
const [city, setCity] = useState("");
const [neighbourhood, setNeighbourhood] = useState("");
const [locationFeatures, setLocationFeatures] = useState([]);
const [commute, setCommute] = useState("");

// Features
const [interior, setInterior] = useState([]);
const [outdoor, setOutdoor] = useState([]);
const [building, setBuilding] = useState([]);

// Standout
const [uniqueFeature, setUniqueFeature] = useState("");
const [agentNote, setAgentNote] = useState("");

// Tone
const [tone, setTone] = useState("");
const [targetBuyer, setTargetBuyer] = useState("");
const [agentName, setAgentName] = useState("");
const [agentPhone, setAgentPhone] = useState("");

const toggle = (arr, setArr, val) => setArr(arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val]);

const totalSteps = mode === "sold" ? 4 : mode === "open_house" ? 5 : 6;

const canProceed = () => {
if (currentStep === 1) return !!mode;
if (currentStep === 2) return propType && address && price && (mode === "sold" ? true : beds && baths);
if (currentStep === 3) return !!city;
if (currentStep === 4) return mode === "sold" ? !!tone : interior.length > 0 || outdoor.length > 0;
if (currentStep === 5) return mode === "open_house" ? !!tone : true;
if (currentStep === 6) return !!tone;
return true;
};

const langInstruction = language !== "English" ? `\n\nIMPORTANT: Write ALL content in ${language}. Every word must be in ${language}.` : "";

const propSummary = [
`Mode: ${MODE_TYPES.find(m => m.value === mode)?.label || mode}`,
`${propType} at ${address}`,
`Price: $${price}${oldPrice ? ` (was $${oldPrice})` : ""}`,
(beds || baths) && `Beds: ${beds} | Baths: ${baths}${sqft ? ` | ${sqft} sqft` : ""}${yearBuilt ? ` | Built ${yearBuilt}` : ""}`,
condition && `Condition: ${condition}`,
mode === "sold" && soldPrice && `Sold Price: $${soldPrice}${daysOnMarket ? ` in ${daysOnMarket} days` : ""}`,
mode === "open_house" && openHouseDate && `Open House: ${openHouseDate} at ${openHouseTime}`,
`City: ${city}${neighbourhood ? `, ${neighbourhood}` : ""}`,

agentNote && `Notes: ${agentNote}`,
`Tone: ${tone} | Buyer: ${targetBuyer || "general"}`,
`Agent: ${agentName || "Agent"}${agentPhone ? ` | ${agentPhone}` : ""}`,
].filter(Boolean).join("\n");

const generate = async () => {
setError(""); setLoading(true); setResult(null); setLoadingPct(0);
try {
setLoadingMsg("Writing listing & email..."); setLoadingPct(15);

let listingPrompt = "";
if (mode === "new_listing") {
listingPrompt = `{"listing":"130-150 word MLS description with hook opener, lifestyle, top features, urgency close","email_subject":"compelling email subject under 9 words","email_body":"120-140 word personal email signed by ${agentName || "Your Agent"}"}`;

listingPrompt = `{"listing":"120-140 word open house announcement with date ${openHouseDate} at ${openHouseTime}, top features, RSVP/attend CTA","email_subject":"open house invite subject under 9 words","email_body":"110-130 word personal open house invite email signed by ${agentName || "Your Agent"}"}`;

listingPrompt = `{"listing":"120-140 word price reduction announcement highlighting new price, urgency, top features, act now CTA","email_subject":"price drop announcement subject under 9 words","email_body":"110-130 word personal price reduction email signed by ${agentName || "Your Agent"}"}`;

listingPrompt = `{"listing":"100-120 word just sold announcement celebrating the sale, building agent credibility, asking for referrals","email_subject":"just sold announcement subject under 9 words","email_body":"100-120 word just sold email to sphere of influence signed by ${agentName || "Your Agent"}"}`;
}

const r1 = await askClaude(apiKey, SYSTEM,
`Property info:\n${propSummary}${langInstruction}\n\nWrite this JSON:\n${listingPrompt}`, 800);
setLoadingPct(35);

setLoadingMsg("Writing social media posts...");
const r2 = await askClaude(apiKey, SYSTEM,
`Property info:\n${propSummary}${langInstruction}\n\nWrite this JSON:\n{"instagram":"65-80 word Instagram caption with 6-8 emojis and strong CTA","facebook":"70-90 word Facebook caption with price and DM me to book a viewing at end","twitter":"max 220 character Twitter post with price and CTA","linkedin":"80-100 word professional LinkedIn post with price and CTA"}`, 700);

setLoadingMsg("Writing ads and SMS...");
const r3 = await askClaude(apiKey, SYSTEM,

setLoadingPct(75);

setLoadingMsg("Writing TikTok script & neighbour letter...");
const r4 = await askClaude(apiKey, SYSTEM,
`Property info:\n${propSummary}${langInstruction}\n\nWrite this JSON:\n{"tiktok_script":"TikTok script with 3 labelled sections: HOOK (3 seconds, scroll-stopping opener), BODY (top 3 features dramatically), CTA (clear action). 45-55 seconds total when read aloud.","neighbour_letter":"200-220 word formal letter to neighbours. Start with Dear Neighbour, then 3 paragraphs: introduce the listing, top features and why rare, ask them to refer anyone looking. Sign off: Warm regards then ${agentName || "Your Agent"}${agentPhone ? " then " + agentPhone : ""}."}`, 900);
setLoadingMsg("Building your posting schedule...");
const r5 = await askClaude(apiKey, SYSTEM,
`Property info:\n${propSummary}\nMode: ${mode}\n\nCreate a practical day-by-day marketing schedule for this property. Return ONLY this JSON:\n{"schedule":[{"day":"Day 1 — Launch Day","icon":"🚀","tasks":["Post MLS listing on all portals","Send WhatsApp broadcast to your database","Post Instagram caption with best property photo","Send SMS blast to hot leads","Email your buyer list with the email body","Hand-deliver neighbour letters within 500 metres"]},{"day":"Day 2","icon":"📱","tasks":["Post Facebook caption","Share LinkedIn post","Follow up by phone with anyone who replied to your WhatsApp"]},{"day":"Day 3","icon":"🎯","tasks":["Run Facebook and Instagram ad","Post Twitter/X update","Call any leads who opened your email but did not reply"]},{"day":"Day 5","icon":"🎬","tasks":["Post TikTok video using your script","Share behind-the-scenes story content on Instagram"]},{"day":"Day 7 — Week 1 Review","icon":"📊","tasks":["Check ad performance — pause what is not working","Re-send WhatsApp to anyone who did not open","Book any viewing requests that came in"]},{"day":"Day 10","icon":"🔄","tasks":["Post a second Instagram update — different angle or feature","Send a second email to your list with a fresh subject line"]},{"day":"Day 14 — Two Week Push","icon":"💥","tasks":["Lower ad budget if no strong leads — refocus spend","Call all leads who have not replied yet","Consider a price review if no serious interest"]},{"day":"Day 21","icon":"📣","tasks":["Post a testimonial or interest update on social media","Send final WhatsApp broadcast with urgency message","Run one last targeted ad push"]}]}`, 1000);
setLoadingPct(100);

setResult({ ...r1, ...r2, ...r3, ...r4, ...r5 });
setActiveTab("listing");
} catch (err) {
setError(err.message);
}
setLoading(false); setLoadingMsg(""); setLoadingPct(0);
};

const base = { fontFamily: "'Georgia', serif", minHeight: "100vh", background: G.bg, color: G.text };

</>}
{activeTab === "social" && <>
<OutputCard title="Instagram Caption" icon="📸" content={result.instagram} />
<OutputCard title="Facebook Caption" icon="👥" content={result.facebook} />
<OutputCard title="Twitter / X Post" icon="⚡" content={result.twitter} />
<OutputCard title="LinkedIn Post" icon="💼" content={result.linkedin} />
</>}
{activeTab === "ads" && <>
<OutputCard title="SMS Blast" icon="📱" badge="155 chars" content={result.sms_blast} />
<OutputCard title="WhatsApp Broadcast" icon="💬" content={result.whatsapp_broadcast} />
<OutputCard title="Google Ad" icon="🔍" content={result.google_ad} />
<OutputCard title="Facebook / Instagram Ad" icon="🎯" content={result.facebook_ad} />
</>}
{activeTab === "tiktok" && <OutputCard title="TikTok Video Script" icon="🎬" content={result.tiktok_script} />}
{activeTab === "neighbours" && <>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 14px" }}>Print and hand-deliver to nearby neighbours.</p>
<OutputCard title="Neighbour Letter" icon="✉️" content={result.neighbour_letter} />
</>}
{activeTab === "schedule" && <>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Your day-by-day action plan. Follow this exactly and you will maximise every listing.</p>
{result.schedule && result.schedule.map((day, i) => (
<div key={i} style={{ background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 10, padding: "16px 18px", marginBottom: 14 }}>
<div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
<span style={{ fontSize: 22 }}>{day.icon}</span>
<span style={{ fontSize: 14, fontWeight: 700, color: G.gold }}>{day.day}</span>
</div>
<div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
{day.tasks && day.tasks.map((task, j) => (
<div key={j} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
<span style={{ color: G.gold, fontWeight: 700, flexShrink: 0, fontSize: 14 }}>→</span>
<span style={{ fontSize: 14, color: "#d1d5db", lineHeight: 1.6 }}>{task}</span>
</div>
))}
</div>
</div>
))}
</>}
</div>
</div>
);

// FORM SCREEN
return (
<div style={base}>
<div style={{ borderBottom: `1px solid ${G.border}`, padding: "14px 22px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
<span style={{ fontSize: 15, fontWeight: 700 }}>🏡 Property Marketing Machine</span>
<span style={{ fontSize: 11, color: G.muted }}>Step {currentStep} of {totalSteps} • {language}</span>
</div>
<div style={{ maxWidth: 660, margin: "0 auto", padding: "28px 18px 60px" }}>
<ProgressBar step={currentStep} total={totalSteps} />

{/* STEP 1 — MODE */}
{currentStep === 1 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🎯 What Are You Marketing?</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Select the type of content you need to generate.</p>
<ChipSelect label="Marketing Mode" options={MODE_TYPES} selected={mode} onToggle={setMode} single />
</div>}

{/* STEP 2 — BASICS */}
{currentStep === 2 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🏠 Property Basics</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>The core facts. Be as accurate as possible.</p>
<ChipSelect label="Property Type" options={PROPERTY_TYPES} selected={propType} onToggle={setPropType} single />
<Field label="Full Address" value={address} onChange={setAddress} placeholder="123 Ocean Drive, Miami Beach, FL 33139" />
{mode === "price_reduction" ? (
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="New Price ($)" value={price} onChange={setPrice} placeholder="895,000" />
<Field label="Original Price ($)" value={oldPrice} onChange={setOldPrice} placeholder="995,000" />
</div>
) : mode === "sold" ? (
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="List Price ($)" value={price} onChange={setPrice} placeholder="995,000" />
<Field label="Sold Price ($)" value={soldPrice} onChange={setSoldPrice} placeholder="980,000" />
<Field label="Days on Market" value={daysOnMarket} onChange={setDaysOnMarket} placeholder="12" />
</div>
) : (
<Field label="Asking Price ($)" value={price} onChange={setPrice} placeholder="1,250,000" />
)}
{mode !== "sold" && (
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="Bedrooms" value={beds} onChange={setBeds} placeholder="4" type="number" />
<Field label="Bathrooms" value={baths} onChange={setBaths} placeholder="3" type="number" />
<Field label="Size (sq ft)" value={sqft} onChange={setSqft} placeholder="2,400" />
<Field label="Year Built" value={yearBuilt} onChange={setYearBuilt} placeholder="2019" />
</div>
)}
{mode === "open_house" && (
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="Open House Date" value={openHouseDate} onChange={setOpenHouseDate} placeholder="Saturday, June 14" />
<Field label="Open House Time" value={openHouseTime} onChange={setOpenHouseTime} placeholder="1:00 PM – 4:00 PM" />
</div>
)}
<ChipSelect label="Condition" options={CONDITIONS} selected={condition} onToggle={setCondition} single />
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="Agent Name" value={agentName} onChange={setAgentName} placeholder="James Rivera" />
<Field label="Agent Phone" value={agentPhone} onChange={setAgentPhone} placeholder="+1 305 555 0199" />
</div>
</div>}

{/* STEP 3 — LOCATION */}
{currentStep === 3 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>📍 Location & Views</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Location sells. Tick every feature that applies.</p>
<Field label="City" value={city} onChange={setCity} placeholder="Miami, Dubai, London..." />
<Field label="Neighbourhood / Area" value={neighbourhood} onChange={setNeighbourhood} placeholder="South Beach, Beverly Hills..." />
<ChipSelect label="Location & View Features" options={LOCATION_FEATURES} selected={locationFeatures} onToggle={(v) => toggle(locationFeatures, setLocationFeatures, v)} />
<Field label="Commute & Transport" value={commute} onChange={setCommute} placeholder="2 blocks to metro, 20 min to downtown" />
</div>}

{/* STEP 4 — FEATURES (skip for sold) */}
{currentStep === 4 && mode !== "sold" && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🛋️ Property Features</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Tick everything. More detail = better output.</p>
<ChipSelect label="Interior Features" options={INTERIOR_FEATURES} selected={interior} onToggle={(v) => toggle(interior, setInterior, v)} />
<ChipSelect label="Outdoor Features" options={OUTDOOR_FEATURES} selected={outdoor} onToggle={(v) => toggle(outdoor, setOutdoor, v)} />
<ChipSelect label="Building Amenities" options={BUILDING_FEATURES} selected={building} onToggle={(v) => toggle(building, setBuilding, v)} />
</div>}

{/* STEP 4 SOLD — TONE */}
{currentStep === 4 && mode === "sold" && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🎯 Tone & Style</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>How should the content feel?</p>
<ChipSelect label="Writing Tone" options={TONES} selected={tone} onToggle={setTone} single />
<Field label="Target Audience" value={targetBuyer} onChange={setTargetBuyer} placeholder="Sphere of influence, past clients, local agents..." />
{error && <div style={{ background: "#1a0a0a", border: "1px solid #3a1a1a", borderRadius: 8, padding: "12px", color: "#f87171", fontSize: 13, marginTop: 14 }}>⚠ {error}</div>}
</div>}

{/* STEP 5 — STANDOUT */}
{currentStep === 5 && mode !== "sold" && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>⭐ Standout Details</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>What makes this property impossible to ignore?</p>
<div style={{ marginBottom: 18 }}>
<label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: G.muted, textTransform: "uppercase", marginBottom: 4 }}>The #1 Unique Feature</label>
<textarea value={uniqueFeature} onChange={e => setUniqueFeature(e.target.value)} rows={3}
placeholder="e.g. A 40-foot private boat dock with direct ocean access and unobstructed sunset views"
style={{ width: "100%", background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 8, color: G.text, fontSize: 14, padding: "11px 14px", outline: "none", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
</div>
<div>
<label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: G.muted, textTransform: "uppercase", marginBottom: 4 }}>Additional Notes</label>
<textarea value={agentNote} onChange={e => setAgentNote(e.target.value)} rows={2}
placeholder="e.g. Fully renovated 2024. Motivated seller. New luxury mall opening nearby 2026."
style={{ width: "100%", background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 8, color: G.text, fontSize: 14, padding: "11px 14px", outline: "none", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
</div>
</div>}

{/* STEP 6 — TONE */}
{currentStep === 6 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🎯 Tone & Target Buyer</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Tells the AI exactly who it's writing for.</p>
<ChipSelect label="Writing Tone" options={TONES} selected={tone} onToggle={setTone} single />
<Field label="Ideal Buyer" hint="More specific = better content" value={targetBuyer} onChange={setTargetBuyer} placeholder="High-net-worth families, crypto investors, relocating executives..." />
{error && <div style={{ background: "#1a0a0a", border: "1px solid #3a1a1a", borderRadius: 8, padding: "12px", color: "#f87171", fontSize: 13, marginTop: 14 }}>⚠ {error}</div>}
</div>}

{/* STEP 5 OPEN HOUSE — TONE */}
{currentStep === 5 && mode === "open_house" && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🎯 Tone & Target Buyer</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Tells the AI exactly who it's writing for.</p>
<ChipSelect label="Writing Tone" options={TONES} selected={tone} onToggle={setTone} single />
<Field label="Ideal Buyer" hint="More specific = better content" value={targetBuyer} onChange={setTargetBuyer} placeholder="Families, investors, first-time buyers..." />
{error && <div style={{ background: "#1a0a0a", border: "1px solid #3a1a1a", borderRadius: 8, padding: "12px", color: "#f87171", fontSize: 13, marginTop: 14 }}>⚠ {error}</div>}
</div>}

{loading && <div style={{ background: "#13161b", border: `1px solid ${G.border}`, borderRadius: 10, padding: "16px 20px", marginBottom: 16 }}>
<div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
<p style={{ color: G.gold, fontSize: 13, margin: 0, fontWeight: 600 }}>{loadingMsg}</p>
<span style={{ color: G.muted, fontSize: 12 }}>{loadingPct}%</span>
</div>
<div style={{ width: "100%", height: 4, background: G.border, borderRadius: 2 }}>
<div style={{ width: `${loadingPct}%`, height: "100%", background: G.gold, borderRadius: 2, transition: "width 0.5s ease" }} />
</div>
<p style={{ color: G.muted, fontSize: 12, margin: "8px 0 0" }}>Generating in {language}. Please wait...</p>
</div>}

<div style={{ display: "flex", justifyContent: "space-between" }}>
<button onClick={() => { setError(""); currentStep > 1 ? setCurrentStep(s => s - 1) : setScreen("key"); }} style={btnS} disabled={loading}>← Back</button>
{currentStep < totalSteps
? <button onClick={() => canProceed() ? (setError(""), setCurrentStep(s => s + 1)) : setError("Fill in required fields to continue.")} style={btnP(!canProceed())}>Continue →</button>
: <button onClick={() => canProceed() && !loading && generate()} disabled={loading || !canProceed()} style={{ ...btnP(!canProceed() || loading), minWidth: 200 }}>
{loading ? "Generating..." : "✦ Generate Full Package"}
</button>}
</div>
{error && currentStep < totalSteps && <p style={{ color: "#f87171", fontSize: 12, marginTop: 8, fontFamily: "monospace", textAlign: "right" }}>⚠ {error}</p>}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
