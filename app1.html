<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Property Marketing Machine — Streamflux</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Georgia', serif; background: #0a0c0f; color: #e8eaf0; }
input, textarea, button, select { font-family: inherit; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #13161b; } ::-webkit-scrollbar-thumb { background: #2e2e2e; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const G = {
bg: "#0a0c0f", card: "#13161b", border: "#1e2330",
gold: "#D4A843", goldDim: "#8a6d2a", text: "#e8eaf0",
muted: "#6b7280", green: "#3d9e5c",
};

const STEPS = [
{ id: 1, label: "Basics", icon: "🏠" },
{ id: 2, label: "Location", icon: "📍" },
{ id: 3, label: "Features", icon: "🛋️" },
{ id: 4, label: "Standout", icon: "⭐" },
{ id: 5, label: "Tone", icon: "🎯" },
];

const TONES = [
{ value: "luxury", label: "Luxury & Prestige", desc: "High-end, aspirational" },
{ value: "friendly", label: "Warm & Friendly", desc: "Approachable, homey" },
{ value: "investment", label: "Investment Focus", desc: "ROI, numbers, opportunity" },
{ value: "lifestyle", label: "Lifestyle & Vibe", desc: "Energetic, aspirational" },
];

const PROPERTY_TYPES = ["House","Apartment","Condo","Townhouse","Villa","Penthouse","Studio","Duplex","Triplex","Land / Lot","Commercial","Mixed Use"];
const CONDITIONS = ["Brand New / Off-Plan","Newly Renovated","Move-in Ready","Good Condition","Needs TLC / Fixer-upper"];

const LOCATION_FEATURES = [
"Beachfront","Beach Access","Oceanfront","Ocean View","Lakefront","Lake View",
"Riverfront","River View","Mountain View","Mountain Access","Golf Course View",
"Golf Course Community","City View","City Center","Waterfront","Marina / Boat Dock",
"Desert View","Forest / Wooded","Countryside","Gated Community","Cul-de-Sac",
"Corner Lot","Quiet Street","Shopping & Dining Nearby","Top-Rated Schools",
"Parks & Green Space","Transport Links","Airport Nearby","Highway Access","Walk Score 90+",
];

const INTERIOR_FEATURES = [
"Open Plan Living","High Ceilings","Vaulted Ceilings","Hardwood Floors","Marble Floors",
"Modern Kitchen","Chef's Kitchen","Granite Countertops","Quartz Countertops","Kitchen Island",
"Butler's Pantry","Formal Dining Room","Walk-in Pantry","Master Suite","Walk-in Wardrobe",
"En-suite Bathrooms","Double Vanity","Soaking Tub","Rainfall Shower","Home Office",
"Media Room / Cinema","Smart Home System","Fireplace","Wine Cellar","Wet Bar",
"Laundry Room","In-unit Washer & Dryer","Elevator","Solar Panels","Generator","Storage Room",
];

const OUTDOOR_FEATURES = [
"Private Pool","Heated Pool","Infinity Pool","Hot Tub / Jacuzzi","Rooftop Terrace",
"Wraparound Porch","Covered Patio","Screened Lanai","Balcony","Private Garden",
"Landscaped Yard","Outdoor Kitchen","Built-in BBQ","Fire Pit","Boat Dock",
"Private Beach Access","Tennis Court","Basketball Court","Putting Green","Guest House",
"Garage (1 Car)","Garage (2 Car)","Garage (3+ Car)","Circular Driveway","EV Charging",
"Gated Entry","Security System","RV / Boat Parking","Workshop","Barn / Stable",
];

const BUILDING_FEATURES = [
"Concierge Service","24/7 Security","Doorman","Valet Parking","Rooftop Pool",
"Fitness Center","Yoga Studio","Spa","Co-working Space","Pet-Friendly",
"Guest Suites","Party Room","Low HOA Fees","No HOA","Bike Storage",
];

const TABS = [
{ id: "listing", label: "🏠 Listing" },
{ id: "social", label: "📱 Social" },
{ id: "ads", label: "🎯 Ads & SMS" },
{ id: "tiktok", label: "🎬 TikTok" },
{ id: "neighbours", label: "✉️ Neighbours" },
];

function ProgressBar({ step }) {
return (
<div style={{ display: "flex", gap: 6, marginBottom: 32 }}>
{STEPS.map(s => (
<div key={s.id} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
<div style={{ width: "100%", height: 3, background: step >= s.id ? G.gold : G.border, borderRadius: 2 }} />
<span style={{ fontSize: 10, color: step === s.id ? G.gold : step > s.id ? G.goldDim : G.muted, fontWeight: step === s.id ? 700 : 400, textAlign: "center" }}>
{s.icon} {s.label}
</span>
</div>
))}
</div>
);
}

function Field({ label, hint, value, onChange, placeholder, type = "text" }) {
return (
<div style={{ marginBottom: 18 }}>
<label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: G.muted, textTransform: "uppercase", marginBottom: 4 }}>{label}</label>
{hint && <p style={{ fontSize: 12, color: "#4b5563", margin: "0 0 6px", fontStyle: "italic" }}>{hint}</p>}
<input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
style={{ width: "100%", background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 8, color: G.text, fontSize: 14, padding: "11px 14px", outline: "none", boxSizing: "border-box", fontFamily: "inherit" }} />
</div>
);
}

function ChipSelect({ label, hint, options, selected, onToggle, single = false }) {
return (
<div style={{ marginBottom: 22 }}>
<label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: G.muted, textTransform: "uppercase", marginBottom: 4 }}>{label}</label>
{hint && <p style={{ fontSize: 12, color: "#4b5563", margin: "0 0 8px", fontStyle: "italic" }}>{hint}</p>}
<div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
{options.map(opt => {
const val = typeof opt === "string" ? opt : opt.value;
const lbl = typeof opt === "string" ? opt : opt.label;
const sub = typeof opt === "object" ? opt.desc : null;
const active = single ? selected === val : selected.includes(val);
return (
<button key={val} onClick={() => onToggle(val)} style={{
background: active ? "#1a2a1a" : "#0d1017", border: `1px solid ${active ? G.green : G.border}`,
borderRadius: 7, color: active ? "#6ee7a0" : "#9ca3af", fontSize: 12,
padding: sub ? "9px 13px" : "7px 12px", cursor: "pointer", fontFamily: "inherit", textAlign: "left",
}}>
<div style={{ fontWeight: active ? 700 : 400 }}>{lbl}</div>
{sub && <div style={{ fontSize: 11, color: active ? "#4ade80" : G.muted, marginTop: 2 }}>{sub}</div>}
</button>
);
})}
</div>
</div>
);
}

function OutputCard({ title, content, icon, badge }) {
const [copied, setCopied] = useState(false);
return (
<div style={{ background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 10, padding: "16px 18px", marginBottom: 14 }}>
<div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
<div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
<span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: G.gold, textTransform: "uppercase" }}>{icon} {title}</span>
{badge && <span style={{ fontSize: 10, background: "#1a2a3a", color: "#60a5fa", border: "1px solid #1e3a5a", borderRadius: 4, padding: "2px 7px" }}>{badge}</span>}
</div>
<button onClick={() => { navigator.clipboard.writeText(content); setCopied(true); setTimeout(() => setCopied(false), 1800); }}
style={{ background: copied ? "#1a3a1a" : "#13161b", border: `1px solid ${copied ? "#2a5a2a" : G.border}`, borderRadius: 6, color: copied ? "#4caf50" : "#9ca3af", fontSize: 11, padding: "4px 12px", cursor: "pointer", fontFamily: "inherit", flexShrink: 0 }}>
{copied ? "✓ Copied" : "Copy"}
</button>
</div>
<p style={{ color: "#d1d5db", fontSize: 14, lineHeight: 1.75, margin: 0, whiteSpace: "pre-wrap" }}>{content}</p>
</div>
);
}

const askClaude = async (apiKey, systemPrompt, userPrompt, maxTokens = 900) => {
const res = await fetch("https://api.anthropic.com/v1/messages", {
method: "POST",
headers: {
"Content-Type": "application/json",
"x-api-key": apiKey,
"anthropic-version": "2023-06-01",
"anthropic-dangerous-direct-browser-access": "true"
},
body: JSON.stringify({
model: "claude-sonnet-4-5",
max_tokens: maxTokens,
system: systemPrompt,
messages: [{ role: "user", content: userPrompt }]
}),
});
if (!res.ok) {
const e = await res.json().catch(() => ({}));
throw new Error(e?.error?.message || `API error ${res.status}`);
}
const data = await res.json();
if (data.error) throw new Error(data.error.message);
const raw = data.content.map(i => i.type === "text" ? i.text : "").join("").trim();
const attempts = [
() => JSON.parse(raw),
() => { const m = raw.match(/```(?:json)?\s*([\s\S]*?)```/); if (m) return JSON.parse(m[1].trim()); throw new Error(); },
() => { const m = raw.match(/\{[\s\S]*\}/); if (m) return JSON.parse(m[0]); throw new Error(); },
];
for (const attempt of attempts) {
try { return attempt(); } catch {}
}
throw new Error("AI returned an unexpected format. Please try again.");
};

const SYSTEM = "You are the world's best real estate copywriter. You ALWAYS respond with ONLY a valid JSON object. No markdown. No backticks. No explanation. Just the raw JSON object starting with { and ending with }.";

function App() {
const [screen, setScreen] = useState("key");
const [apiKey, setApiKey] = useState("");
const [currentStep, setCurrentStep] = useState(1);
const [loading, setLoading] = useState(false);
const [loadingMsg, setLoadingMsg] = useState("");
const [loadingPct, setLoadingPct] = useState(0);
const [result, setResult] = useState(null);
const [error, setError] = useState("");
const [activeTab, setActiveTab] = useState("listing");

const [propType, setPropType] = useState("");
const [address, setAddress] = useState("");
const [price, setPrice] = useState("");
const [beds, setBeds] = useState("");
const [baths, setBaths] = useState("");
const [sqft, setSqft] = useState("");
const [lotSize, setLotSize] = useState("");
const [yearBuilt, setYearBuilt] = useState("");
const [condition, setCondition] = useState("");
const [city, setCity] = useState("");
const [neighbourhood, setNeighbourhood] = useState("");
const [locationFeatures, setLocationFeatures] = useState([]);
const [commute, setCommute] = useState("");
const [interior, setInterior] = useState([]);
const [outdoor, setOutdoor] = useState([]);
const [building, setBuilding] = useState([]);
const [uniqueFeature, setUniqueFeature] = useState("");
const [agentNote, setAgentNote] = useState("");
const [tone, setTone] = useState("");
const [targetBuyer, setTargetBuyer] = useState("");
const [agentName, setAgentName] = useState("");
const [agentPhone, setAgentPhone] = useState("");

const toggle = (arr, setArr, val) => setArr(arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val]);

const canProceed = () => {
if (currentStep === 1) return propType && address && price && beds && baths;
if (currentStep === 2) return !!city;
if (currentStep === 3) return interior.length > 0 || outdoor.length > 0;
if (currentStep === 4) return true;
if (currentStep === 5) return !!tone;
return true;
};

const propSummary = [
`${propType} at ${address}`,
`Price: $${price} | Beds: ${beds} | Baths: ${baths}${sqft ? ` | ${sqft} sqft` : ""}${yearBuilt ? ` | Built ${yearBuilt}` : ""}`,
condition && `Condition: ${condition}`,
`City: ${city}${neighbourhood ? `, ${neighbourhood}` : ""}`,
locationFeatures.length && `Views/Location: ${locationFeatures.slice(0, 8).join(", ")}`,
commute && `Transport: ${commute}`,
interior.length && `Interior: ${interior.slice(0, 10).join(", ")}`,
outdoor.length && `Outdoor: ${outdoor.slice(0, 8).join(", ")}`,
building.length && `Amenities: ${building.slice(0, 5).join(", ")}`,
uniqueFeature && `Unique feature: ${uniqueFeature}`,
agentNote && `Notes: ${agentNote}`,
`Tone: ${tone} | Buyer: ${targetBuyer || "general"}`,
`Agent: ${agentName || "Agent"}${agentPhone ? ` | ${agentPhone}` : ""}`,
].filter(Boolean).join("\n");

const generate = async () => {
setError(""); setLoading(true); setResult(null); setLoadingPct(0);
try {
setLoadingMsg("Writing listing description & email..."); setLoadingPct(15);
const r1 = await askClaude(apiKey, SYSTEM,
`Property info:\n${propSummary}\n\nWrite this JSON:\n{"listing":"130-150 word MLS description with hook opener, lifestyle, top features, urgency close","email_subject":"compelling email subject under 9 words","email_body":"120-140 word personal email signed by ${agentName || "Your Agent"}"}`, 800);
setLoadingPct(35);

setLoadingMsg("Writing social media posts...");
const r2 = await askClaude(apiKey, SYSTEM,
`Property info:\n${propSummary}\n\nWrite this JSON:\n{"instagram":"65-80 word Instagram caption with 6-8 emojis and strong CTA","facebook":"70-90 word Facebook caption with price and DM me to book a viewing at end","twitter":"max 220 character Twitter post with price and CTA","linkedin":"80-100 word professional LinkedIn post with price and CTA"}`, 700);
setLoadingPct(55);

setLoadingMsg("Writing ads and SMS blast...");
const r3 = await askClaude(apiKey, SYSTEM,
`Property info:\n${propSummary}\n\nWrite this JSON:\n{"sms_blast":"max 155 character SMS with price address and CTA","whatsapp_broadcast":"60-70 word WhatsApp broadcast with emojis ending with Reply YES for details","google_ad":"Label clearly: Headline (max 30 chars): and Description (max 90 chars):","facebook_ad":"Label clearly: Primary Text (60 words): and Headline (25 chars): and Description (25 chars):"}`, 700);
setLoadingPct(75);

setLoadingMsg("Writing TikTok script & neighbour letter...");
const r4 = await askClaude(apiKey, SYSTEM,
`Property info:\n${propSummary}\n\nWrite this JSON:\n{"tiktok_script":"TikTok script with 3 labelled sections: HOOK (3 seconds, scroll-stopping opener), BODY (top 3 features dramatically), CTA (clear action). 45-55 seconds total when read aloud.","neighbour_letter":"200-220 word formal letter to neighbours. Start with Dear Neighbour, then 3 paragraphs: introduce the listing, top features and why rare, ask them to refer anyone looking. Sign off: Warm regards then ${agentName || "Your Agent"}${agentPhone ? " then " + agentPhone : ""}."}`, 900);
setLoadingPct(100);

setResult({ ...r1, ...r2, ...r3, ...r4 });
setActiveTab("listing");
} catch (err) {
setError(err.message);
}
setLoading(false); setLoadingMsg(""); setLoadingPct(0);
};

const base = { fontFamily: "'Georgia', serif", minHeight: "100vh", background: G.bg, color: G.text };
const card = { background: G.card, border: `1px solid ${G.border}`, borderRadius: 14, padding: "24px", marginBottom: 18 };
const btnP = (dis) => ({ background: dis ? "#1a1f2e" : G.gold, color: dis ? G.muted : "#0a0c0f", border: "none", borderRadius: 10, padding: "14px 22px", fontSize: 14, fontWeight: 700, fontFamily: "inherit", cursor: dis ? "not-allowed" : "pointer" });
const btnS = { background: "transparent", color: G.muted, border: `1px solid ${G.border}`, borderRadius: 10, padding: "14px 22px", fontSize: 14, fontFamily: "inherit", cursor: "pointer" };

if (screen === "key") return (
<div style={base}>
<div style={{ maxWidth: 460, margin: "0 auto", padding: "60px 22px" }}>
<div style={{ textAlign: "center", marginBottom: 30 }}>
<div style={{ fontSize: 40, marginBottom: 10 }}>🏡</div>
<h1 style={{ fontSize: 22, fontWeight: 700, margin: "0 0 6px" }}>Property Marketing Machine</h1>
<p style={{ color: G.muted, fontSize: 13, margin: 0 }}>Your entire marketing package in 30 seconds</p>
</div>
<div style={card}>
<label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: G.muted, textTransform: "uppercase", marginBottom: 6 }}>Claude API Key</label>
<input type="password" value={apiKey} onChange={e => { setApiKey(e.target.value); setError(""); }} placeholder="sk-ant-..."
style={{ width: "100%", background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 8, color: G.text, fontSize: 14, padding: "11px 14px", outline: "none", boxSizing: "border-box", fontFamily: "inherit", marginBottom: 10 }} />
<p style={{ color: G.muted, fontSize: 12, margin: "0 0 16px" }}>Get yours free at <span style={{ color: G.gold }}>console.anthropic.com</span> → API Keys</p>
<button onClick={() => apiKey.length > 10 ? (setError(""), setScreen("form")) : setError("Enter your API key first.")} style={{ ...btnP(false), width: "100%" }}>Get Started →</button>
{error && <p style={{ color: "#f87171", fontSize: 12, marginTop: 10, fontFamily: "monospace" }}>⚠ {error}</p>}
</div>
<p style={{ textAlign: "center", color: G.muted, fontSize: 12, marginTop: 16 }}>
<a href="/" style={{ color: G.muted }}>← Back to Streamflux</a>
</p>
</div>
</div>
);

if (result) return (
<div style={base}>
<div style={{ borderBottom: `1px solid ${G.border}`, padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
<span style={{ fontSize: 15, fontWeight: 700 }}>🏡 Marketing Package Ready</span>
<button onClick={() => { setResult(null); setCurrentStep(1); setError(""); }} style={{ ...btnS, padding: "7px 14px", fontSize: 12 }}>← New Listing</button>
</div>
<div style={{ maxWidth: 720, margin: "0 auto", padding: "22px 16px 60px" }}>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Everything ready. Tap Copy on any piece to use it instantly.</p>
<div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
{TABS.map(tab => (
<button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
background: activeTab === tab.id ? G.gold : "#0d1017", color: activeTab === tab.id ? "#0a0c0f" : G.muted,
border: `1px solid ${activeTab === tab.id ? G.gold : G.border}`, borderRadius: 8, padding: "8px 13px",
fontSize: 12, fontWeight: activeTab === tab.id ? 700 : 400, fontFamily: "inherit", cursor: "pointer",
}}>{tab.label}</button>
))}
</div>
{activeTab === "listing" && <>
<OutputCard title="MLS Listing Description" icon="🏠" content={result.listing} />
<OutputCard title="Email Subject Line" icon="📧" content={result.email_subject} />
<OutputCard title="Email Body" icon="📨" content={result.email_body} />
</>}
{activeTab === "social" && <>
<OutputCard title="Instagram Caption" icon="📸" content={result.instagram} />
<OutputCard title="Facebook Caption" icon="👥" content={result.facebook} />
<OutputCard title="Twitter / X Post" icon="⚡" content={result.twitter} />
<OutputCard title="LinkedIn Post" icon="💼" content={result.linkedin} />
</>}
{activeTab === "ads" && <>
<OutputCard title="SMS Blast" icon="📱" badge="155 chars" content={result.sms_blast} />
<OutputCard title="WhatsApp Broadcast" icon="💬" content={result.whatsapp_broadcast} />
<OutputCard title="Google Ad" icon="🔍" content={result.google_ad} />
<OutputCard title="Facebook / Instagram Ad" icon="🎯" content={result.facebook_ad} />
</>}
{activeTab === "tiktok" && <OutputCard title="TikTok Video Script" icon="🎬" content={result.tiktok_script} />}
{activeTab === "neighbours" && <>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 14px" }}>Print and hand-deliver to nearby neighbours — they often know the next buyer.</p>
<OutputCard title="Neighbour Letter" icon="✉️" content={result.neighbour_letter} />
</>}
</div>
</div>
);

return (
<div style={base}>
<div style={{ borderBottom: `1px solid ${G.border}`, padding: "14px 22px", display: "flex", alignItems: "center", gap: 10 }}>
<span style={{ fontSize: 15, fontWeight: 700 }}>🏡 Property Marketing Machine</span>
<span style={{ fontSize: 11, color: G.muted }}>Step {currentStep} of 5</span>
</div>
<div style={{ maxWidth: 660, margin: "0 auto", padding: "28px 18px 60px" }}>
<ProgressBar step={currentStep} />

{currentStep === 1 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🏠 Property Basics</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>The core facts. Be as accurate as possible.</p>
<ChipSelect label="Property Type" options={PROPERTY_TYPES} selected={propType} onToggle={setPropType} single />
<Field label="Full Address" value={address} onChange={setAddress} placeholder="123 Ocean Drive, Miami Beach, FL 33139" />
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="Asking Price ($)" value={price} onChange={setPrice} placeholder="1,250,000" />
<Field label="Size (sq ft)" value={sqft} onChange={setSqft} placeholder="2,400" />
<Field label="Bedrooms" value={beds} onChange={setBeds} placeholder="4" type="number" />
<Field label="Bathrooms" value={baths} onChange={setBaths} placeholder="3" type="number" />
<Field label="Lot Size" value={lotSize} onChange={setLotSize} placeholder="0.25 acres" />
<Field label="Year Built" value={yearBuilt} onChange={setYearBuilt} placeholder="2019" />
</div>
<ChipSelect label="Condition" options={CONDITIONS} selected={condition} onToggle={setCondition} single />
<div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
<Field label="Agent Name" value={agentName} onChange={setAgentName} placeholder="James Rivera" />
<Field label="Agent Phone" value={agentPhone} onChange={setAgentPhone} placeholder="+1 305 555 0199" />
</div>
</div>}

{currentStep === 2 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>📍 Location & Views</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Location sells. Tick every feature that applies.</p>
<Field label="City" value={city} onChange={setCity} placeholder="Miami, Dubai, London..." />
<Field label="Neighbourhood / Area" value={neighbourhood} onChange={setNeighbourhood} placeholder="South Beach, Beverly Hills, Notting Hill..." />
<ChipSelect label="Location & View Features" options={LOCATION_FEATURES} selected={locationFeatures} onToggle={(v) => toggle(locationFeatures, setLocationFeatures, v)} />
<Field label="Commute & Transport" hint="e.g. 5 min to highway, 10 min to airport" value={commute} onChange={setCommute} placeholder="2 blocks to metro, 20 min to downtown" />
</div>}

{currentStep === 3 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🛋️ Property Features</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Tick everything. More detail = better output.</p>
<ChipSelect label="Interior Features" options={INTERIOR_FEATURES} selected={interior} onToggle={(v) => toggle(interior, setInterior, v)} />
<ChipSelect label="Outdoor Features" options={OUTDOOR_FEATURES} selected={outdoor} onToggle={(v) => toggle(outdoor, setOutdoor, v)} />
<ChipSelect label="Building Amenities" options={BUILDING_FEATURES} selected={building} onToggle={(v) => toggle(building, setBuilding, v)} />
</div>}

{currentStep === 4 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>⭐ Standout Details</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>What makes this property impossible to ignore?</p>
<div style={{ marginBottom: 18 }}>
<label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: G.muted, textTransform: "uppercase", marginBottom: 4 }}>The #1 Unique Feature</label>
<p style={{ fontSize: 12, color: "#4b5563", margin: "0 0 7px", fontStyle: "italic" }}>Be specific and vivid — this is the money detail.</p>
<textarea value={uniqueFeature} onChange={e => setUniqueFeature(e.target.value)} rows={3}
placeholder="e.g. A 40-foot private boat dock with direct ocean access and unobstructed sunset views from every room"
style={{ width: "100%", background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 8, color: G.text, fontSize: 14, padding: "11px 14px", outline: "none", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
</div>
<div>
<label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: G.muted, textTransform: "uppercase", marginBottom: 4 }}>Additional Notes</label>
<textarea value={agentNote} onChange={e => setAgentNote(e.target.value)} rows={2}
placeholder="e.g. Fully renovated 2024. Motivated seller. New luxury mall opening nearby 2026."
style={{ width: "100%", background: "#0d1017", border: `1px solid ${G.border}`, borderRadius: 8, color: G.text, fontSize: 14, padding: "11px 14px", outline: "none", boxSizing: "border-box", fontFamily: "inherit", resize: "vertical" }} />
</div>
</div>}

{currentStep === 5 && <div style={card}>
<h2 style={{ margin: "0 0 4px", fontSize: 17, fontWeight: 700 }}>🎯 Tone & Target Buyer</h2>
<p style={{ color: G.muted, fontSize: 13, margin: "0 0 18px" }}>Tells the AI exactly who it's writing for.</p>
<ChipSelect label="Writing Tone" options={TONES} selected={tone} onToggle={setTone} single />
<Field label="Ideal Buyer" hint="More specific = better content" value={targetBuyer} onChange={setTargetBuyer} placeholder="High-net-worth families, crypto investors, relocating executives..." />
{error && <div style={{ background: "#1a0a0a", border: "1px solid #3a1a1a", borderRadius: 8, padding: "12px", color: "#f87171", fontSize: 13, marginTop: 14, fontFamily: "monospace" }}>⚠ {error}</div>}
</div>}

{loading && <div style={{ background: "#13161b", border: `1px solid ${G.border}`, borderRadius: 10, padding: "16px 20px", marginBottom: 16 }}>
<div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
<p style={{ color: G.gold, fontSize: 13, margin: 0, fontWeight: 600 }}>{loadingMsg}</p>
<span style={{ color: G.muted, fontSize: 12 }}>{loadingPct}%</span>
</div>
<div style={{ width: "100%", height: 4, background: G.border, borderRadius: 2 }}>
<div style={{ width: `${loadingPct}%`, height: "100%", background: G.gold, borderRadius: 2, transition: "width 0.5s ease" }} />
</div>
<p style={{ color: G.muted, fontSize: 12, margin: "8px 0 0" }}>Making 4 AI requests for best quality. Please wait...</p>
</div>}

<div style={{ display: "flex", justifyContent: "space-between" }}>
<button onClick={() => { setError(""); currentStep > 1 ? setCurrentStep(s => s - 1) : setScreen("key"); }} style={btnS} disabled={loading}>← Back</button>
{currentStep < 5
? <button onClick={() => canProceed() ? (setError(""), setCurrentStep(s => s + 1)) : setError("Fill in required fields to continue.")} style={btnP(!canProceed())}>Continue →</button>
: <button onClick={() => canProceed() && !loading && generate()} disabled={loading || !canProceed()} style={{ ...btnP(!canProceed() || loading), minWidth: 200 }}>
{loading ? "Generating..." : "✦ Generate Full Package"}
</button>}
</div>
{error && currentStep < 5 && <p style={{ color: "#f87171", fontSize: 12, marginTop: 8, fontFamily: "monospace", textAlign: "right" }}>⚠ {error}</p>}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
